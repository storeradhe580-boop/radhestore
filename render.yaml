# Render Configuration for Laravel Deployment

services:
  # PHP Service
  - type: web
    name: radhe-store
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    buildCommand: ./build.sh
    startCommand: apache2-foreground
    documentRoot: /var/www/html/public
    healthCheckPath: /health
    
    # Environment Variables
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: true
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://radhestore-dhiu.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: dpg-d72ghbh9fqoc73a9f3f0-a
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        value: radhestore_a9ag
      - key: DB_USERNAME
        value: radhestore_a9ag_user
      - key: DB_PASSWORD
        value: GTXaad5jo6P6EUbd8wKB7e9VfiWsNbgS
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: PORT
        value: 10000

  # Redis Cache
  - type: pserv
    name: redis
    env: redis
    plan: free
    stateful: true

# Working Directory
workingDirectory: /var/www/html
